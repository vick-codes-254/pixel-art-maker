<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Art Maker v2</title>
<style>
body { background: #1a1a1a; color: #fff; font-family: Arial; text-align: center; padding: 15px; }
h1 { color: #6c5ce7; margin: 0 0 10px; }
.tools { display: flex; justify-content: center; gap: 10px; margin: 10px 0; flex-wrap: wrap; align-items: center; }
.tool { padding: 8px 14px; background: #222; border: 1px solid #333; border-radius: 4px; cursor: pointer; color: #fff; }
.tool.active { background: #6c5ce7; border-color: #6c5ce7; }
.color { width: 28px; height: 28px; border: 2px solid transparent; cursor: pointer; display: inline-block; margin: 2px; border-radius: 3px; }
.color.sel { border-color: #fff; transform: scale(1.15); }
#canvas { border: 2px solid #333; cursor: crosshair; image-rendering: pixelated; display: block; margin: 0 auto; }
input[type=range] { width: 120px; }
.actions { margin-top: 10px; }
button { background: #6c5ce7; color: #fff; border: none; padding: 8px 14px; cursor: pointer; border-radius: 4px; font-size: 13px; }
button:hover { background: #5a4bd1; }
.info { color: #888; font-size: 12px; margin: 6px 0; }
</style>
</head>
<body>
<h1>🎨 Pixel Art Maker v2</h1>
<div class="tools">
  <span>Tools:</span>
  <div class="tool active" onclick="setTool('paint')" id="tool-paint">✏️ Paint</div>
  <div class="tool" onclick="setTool('eraser')" id="tool-eraser">🧹 Eraser</div>
  <div class="tool" onclick="setTool('fill')" id="tool-fill">🪣 Fill</div>
  <div class="tool" onclick="setTool('picker')" id="tool-picker">💉 Picker</div>
  <button onclick="undo()">↩ Undo</button>
  <span>Size: <span id="sizeVal">16</span></span>
  <input type="range" id="size" min="8" max="64" value="16" step="8">
  <span>Color:</span>
  <div id="colors"></div>
</div>
<div class="info">Forkan / drag to draw | Double-click to pick color</div>
<canvas id="canvas"></canvas>
<div class="actions">
  <button onclick="clearCanvas()">Clear</button>
  <button onclick="toggleGrid()">Grid</button>
  <button onclick="saveJSON()">Save JSON</button>
  <button onclick="document.getElementById('loadFile').click()">Load JSON</button>
  <input type="file" id="loadFile" accept=".json" style="display:none" onchange="loadJSON(event)">
  <button onclick="download()">Download PNG</button>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const sizeSlider = document.getElementById('size');
const sizeVal = document.getElementById('sizeVal');
let size = 16; let pixelSize = 22; let drawing = false; let currentColor = '#6c5ce7'; let gridOn = true;
let tool = 'paint'; let history = []; let maxHistory = 20;

const palette = ['#6c5ce7','#a29bfe','#fd79a8','#e17055','#fdcb6e','#00b894','#0984e3','#dfe6e9','#2d3436','#ffffff','#ff7675','#74b9ff','#55efc4','#ffeaa7','#e84393','#0a0a0a'];
palette.forEach(c => {
  let d = document.createElement('div'); d.className='color'; d.style.background=c;
  d.onclick = () => { currentColor=c; document.querySelectorAll('.color').forEach(x=>x.classList.remove('sel')); d.classList.add('sel'); };
  document.getElementById('colors').appendChild(d);
});
document.querySelector('.color').classList.add('sel');

function saveState() {
  history.push({size,data:ctx.getImageData(0,0,canvas.width,canvas.height)});
  if(history.length>maxHistory) history.shift();
}
function undo() {
  if(!history.length) return;
  let s = history.pop(); size = s.size; sizeSlider.value = size; sizeVal.textContent = size;
  pixelSize = Math.min(Math.floor(600/size),22);
  canvas.width = size*pixelSize; canvas.height = size*pixelSize;
  ctx.putImageData(s.data,0,0);
  if(gridOn) drawGridOverlay();
}

function setTool(t) { tool=t; document.querySelectorAll('.tool').forEach(x=>x.classList.remove('active')); document.getElementById('tool-'+t).classList.add('active'); canvas.style.cursor = t==='picker'?'crosshair':t==='fill'?'cell':'default'; }

function initCanvas() {
  saveState();
  size = parseInt(sizeSlider.value); sizeVal.textContent = size;
  pixelSize = Math.min(Math.floor(600/size),22);
  canvas.width = size*pixelSize; canvas.height = size*pixelSize;
  drawGrid(); saveState();
}

function drawGrid() {
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<size;i++) for(let j=0;j<size;j++) { ctx.fillStyle='#252525'; ctx.fillRect(i*pixelSize,j*pixelSize,pixelSize-1,pixelSize-1); }
}
function drawGridOverlay() {
  ctx.strokeStyle='#333'; ctx.lineWidth=1;
  for(let i=0;i<=size;i++) { ctx.beginPath(); ctx.moveTo(i*pixelSize,0); ctx.lineTo(i*pixelSize,canvas.height); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,i*pixelSize); ctx.lineTo(canvas.width,i*pixelSize); ctx.stroke(); }
}

function getPos(e) { const r=canvas.getBoundingClientRect(); return {x:Math.floor((e.clientX-r.left)/pixelSize)*pixelSize,y:Math.floor((e.clientY-r.top)/pixelSize)*pixelSize}; }
function getCoord(e) { const r=canvas.getBoundingClientRect(); return {i:Math.floor((e.clientX-r.left)/pixelSize),j:Math.floor((e.clientY-r.top)/pixelSize)}; }

function floodFill(si,sj,fill) {
  let img = ctx.getImageData(0,0,canvas.width,canvas.height);
  let targetColor = getPixel(img,si,sj);
  if(targetColor[0]===fill[0]&&targetColor[1]===fill[1]&&targetColor[2]===fill[2]&&targetColor[3]===fill[3]) return;
  let stack = [[si,sj]]; let visited = new Set();
  while(stack.length) { let [x,y]=stack.pop(); let key=x+','+y; if(visited.has(key)||x<0||x>=size||y<0||y>=size) continue; visited.add(key); let c=getPixel(img,x,y); if(c[0]!==targetColor[0]||c[1]!==targetColor[1]||c[2]!==targetColor[2]||c[3]!==targetColor[3]) continue; setPixel(img,x,y,fill[0],fill[1],fill[2],fill[3]); stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]); }
  ctx.putImageData(img,0,0);
}
function getPixel(img,x,y) { let i=(y*pixelSize*img.width)+(x*pixelSize*4); return [img.data[i],img.data[i+1],img.data[i+2],img.data[i+3]]; }
function setPixel(img,x,y,r,g,b,a) { let i=(y*pixelSize*img.width)+(x*pixelSize*4); img.data[i]=r; img.data[i+1]=g; img.data[i+2]=b; img.data[i+3]=a; }
function parseColor(hex) { let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return [r,g,b,255]; }

canvas.addEventListener('mousedown', e => {
  saveState();
  let pos = getPos(e); let coord = getCoord(e);
  if(tool==='paint') { drawing=true; ctx.fillStyle=currentColor; ctx.fillRect(pos.x,pos.y,pixelSize-1,pixelSize-1); if(gridOn) drawGridOverlay(); }
  else if(tool==='eraser') { drawing=true; ctx.fillStyle='#252525'; ctx.fillRect(pos.x,pos.y,pixelSize-1,pixelSize-1); if(gridOn) drawGridOverlay(); }
  else if(tool==='fill') { floodFill(coord.i,coord.j,parseColor(currentColor)); }
  else if(tool==='picker') { let p=getPixel(ctx.getImageData(0,0,canvas.width,canvas.height),coord.i,coord.j); currentColor='#'+((1<<24)+(p[0]<<16)+(p[1]<<8)+p[2]).toString(16).slice(1); document.querySelectorAll('.color').forEach(x=>x.classList.remove('sel')); }
});
canvas.addEventListener('mousemove', e => {
  if(!drawing) return;
  let pos = getPos(e);
  if(tool==='paint'||tool==='eraser') { ctx.fillStyle=tool==='paint'?currentColor:'#252525'; ctx.fillRect(pos.x,pos.y,pixelSize-1,pixelSize-1); if(gridOn) drawGridOverlay(); }
});
canvas.addEventListener('mouseup', () => drawing=false);
canvas.addEventListener('mouseleave', () => drawing=false);

function clearCanvas() { saveState(); drawGrid(); }
function toggleGrid() { gridOn=!gridOn; if(gridOn) drawGridOverlay(); else { initCanvas(); } }
function download() {
  let tmp = document.createElement('canvas'); tmp.width=canvas.width; tmp.height=canvas.height; let t=tmp.getContext('2d'); t.fillStyle='#fff'; t.fillRect(0,0,tmp.width,tmp.height); t.drawImage(canvas,0,0);
  let link=document.createElement('a'); link.download='pixel-art.png'; link.href=tmp.toDataURL(); link.click();
}
function saveJSON() {
  let data = {size,data:Array.from(ctx.getImageData(0,0,canvas.width,canvas.height).data)};
  let blob = new Blob([JSON.stringify(data)],{type:'application/json'});
  let link=document.createElement('a'); link.download='art.json'; link.href=URL.createObjectURL(blob); link.click();
}
function loadJSON(e) {
  let file = e.target.files[0]; if(!file) return; let reader = new FileReader();
  reader.onload = ev => {
    let data = JSON.parse(ev.target.result); size=data.size; sizeSlider.value=size; sizeVal.textContent=size; pixelSize=Math.min(Math.floor(600/size),22); canvas.width=size*pixelSize; canvas.height=size*pixelSize; let img=ctx.createImageData(canvas.width,canvas.height); img.data.set(data.data); ctx.putImageData(img,0,0); if(gridOn) drawGridOverlay();
  };
  reader.readAsText(file);
}

initCanvas();
</script>
</body>
</html>
